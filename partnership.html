<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - 프리미엄 로또 번호 생성기</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: left;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 1rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>제휴 문의</h1>
        <p class="subtitle">비즈니스 협력 제안을 기다립니다.</p>
        
        <form action="https://formspree.io/f/xpqbynee" method="POST">
            <div class="form-group">
                <label for="company">업체명 / 성함</label>
                <input type="text" name="company" id="company" required placeholder="예: (주)행운컴퍼니 / 홍길동">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" name="_replyto" id="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" name="phone" id="phone" placeholder="010-0000-0000">
            </div>
            <div class="form-group">
                <label for="message">제휴 내용</label>
                <textarea name="message" id="message" required placeholder="제휴하고 싶은 내용을 자유롭게 적어주세요."></textarea>
            </div>
            
            <!-- Formspree setting: redirection after success -->
            <input type="hidden" name="_next" value="https://baeyongwon-github.github.io/productbuilder-lecture/index.html">
            <input type="hidden" name="_subject" value="새로운 제휴 문의가 접수되었습니다!">

            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
        
        <a href="index.html" class="back-link">메인으로 돌아가기</a>
    </div>
</body>
</html>
