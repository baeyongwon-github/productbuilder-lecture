<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 사진 업로드</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5553605413382831"
     crossorigin="anonymous"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 60px 20px 20px;
        }

        /* 메인 네비게이션 탭 */
        .main-nav {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .nav-item {
            padding: 10px 20px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-item:hover:not(.active) {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            flex-shrink: 0;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* 업로드 영역 스타일 */
        .upload-area {
            margin: 0 auto 2rem;
            width: 300px;
            height: 300px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover, .upload-area.dragover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #60a5fa;
            transform: scale(1.02);
        }

        .upload-area.dragover {
            border-style: solid;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .upload-area:hover .upload-icon {
            transform: translateY(-5px);
        }

        .upload-text {
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 0 20px;
        }

        #image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            border-radius: 20px;
        }

        #file-input {
            display: none;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 1rem;
            display: none; /* 초기에는 숨김 */
        }

        .prediction-bar {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prediction-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .class-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #cbd5e1;
        }

        .probability {
            font-weight: 800;
            color: #60a5fa;
        }

        .progress-bg {
            background: rgba(255, 255, 255, 0.05);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 6px;
        }

        #loading {
            display: none;
            color: #60a5fa;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .upload-area {
                width: 240px;
                height: 240px;
            }
        }
    </style>
</head>

<body>
    <nav class="main-nav">
        <a href="index.html" class="nav-item">로또 번호 생성</a>
        <a href="animal.html" class="nav-item active">동물상 테스트</a>
    </nav>

    <div class="container">
        <h1>AI 동물상 테스트</h1>
        <p class="subtitle">나의 얼굴 사진을 올려 분석해 보세요!</p>

        <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
            <div id="upload-placeholder">
                <div class="upload-icon">📸</div>
                <div class="upload-text">사진을 클릭하거나 드래그하여 업로드하세요</div>
            </div>
            <img id="image-preview" alt="Preview">
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(this.files)">

        <div id="loading">AI가 분석 중입니다...</div>

        <div id="label-container">
            <!-- Results will be loaded here -->
        </div>

        <a href="partnership.html"
            style="margin-top: 1.5rem; color: #94a3b8; text-decoration: none; font-size: 0.85rem; transition: color 0.3s;"
            onmouseover="this.style.color='white'" onmouseout="this.style.color='#94a3b8'">비즈니스 제휴 문의</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/Oeeq0njDl/";
        const uploadArea = document.getElementById('upload-area');

        let model, labelContainer, maxPredictions;

        // 드래그 앤 드롭 이벤트 처리
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            handleFileUpload(files);
        });

        // 모델 로드 함수
        async function loadModel() {
            if (!model) {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
            }
        }

        // 파일 업로드 핸들러
        async function handleFileUpload(files) {
            if (files && files[0]) {
                const reader = new FileReader();

                reader.onload = async function (e) {
                    // 미리보기 설정
                    const preview = document.getElementById('image-preview');
                    const placeholder = document.getElementById('upload-placeholder');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';

                    // 결과창 초기화 및 로딩 표시
                    document.getElementById('loading').style.display = 'block';
                    document.getElementById('label-container').style.display = 'none';
                    document.getElementById('label-container').innerHTML = '';

                    // 모델 로드 및 예측
                    await loadModel();
                    await predict(preview);
                };

                reader.readAsDataURL(files[0]);
            }
        }

        async function predict(imageElement) {
            const prediction = await model.predict(imageElement);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.style.display = 'flex';
            document.getElementById('loading').style.display = 'none';

            // 결과 정렬 (확률 높은 순)
            prediction.sort((a, b) => b.probability - a.probability);

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0);
                
                let displayName = className;
                if(className === "dog") displayName = "강아지상";
                if(className === "cat") displayName = "고양이상";

                const bar = document.createElement("div");
                bar.className = "prediction-bar";
                bar.innerHTML = `
                    <div class="prediction-info">
                        <span class="class-name">${displayName}</span>
                        <span class="probability">${probability}%</span>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-fill" style="width: ${probability}%"></div>
                    </div>
                `;
                labelContainer.appendChild(bar);
            }
        }
    </script>
</body>

</html>
